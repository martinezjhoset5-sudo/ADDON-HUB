<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AddonHub Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-matrix: #030712;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --text-neon: #00f5ff;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-primary: #7c4dff;
            --neon-secondary: #00e5ff;
            --neon-success: #00ffa3;
            --neon-danger: #ff0055;
            --border-glow: rgba(0, 245, 255, 0.15);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Rajdhani', sans-serif; 
            letter-spacing: 0.5px;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: var(--bg-matrix); 
            color: var(--text-main); 
            padding-bottom: 90px; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .app-container { 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            position: relative; 
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: var(--panel-bg); 
            border-bottom: 2px solid var(--text-neon); 
            position: sticky; 
            top: 0; 
            z-index: 999; 
            backdrop-filter: blur(16px); 
        }
        
        .logo { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 20px; 
            font-weight: 900; 
            text-transform: uppercase; 
            text-shadow: 0 0 10px var(--text-neon); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .user-profile-btn { 
            background: none; 
            border: 2px solid var(--neon-secondary); 
            border-radius: 50%; 
            width: 38px; 
            height: 38px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--neon-secondary); 
            font-size: 18px; 
        }
        .user-profile-btn img { width: 100%; height: 100%; object-fit: cover; }

        .search-area { display: flex; flex-direction: column; gap: 10px; margin: 15px 20px; }
        .search-bar { display: flex; align-items: center; background: var(--panel-bg); padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-glow); }
        .search-bar input { background: transparent; border: none; color: var(--text-main); margin-left: 10px; width: 100%; outline: none; font-size: 16px; }
        .sort-select { background: var(--panel-bg); border: 1px solid var(--border-glow); color: var(--text-neon); padding: 10px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 12px; outline: none; }

        .categories { display: flex; gap: 8px; padding: 0 20px 15px 20px; overflow-x: auto; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .badge { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; text-transform: uppercase; white-space: nowrap; border: 1px solid var(--border-glow); }
        .badge.active { background: var(--neon-primary); color: #fff; border-color: var(--neon-primary); box-shadow: 0 0 10px var(--neon-primary); }

        h2, h3 { font-family: 'Orbitron', sans-serif; padding: 0 20px; font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        
        .addon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px 20px 20px; }
        .addon-card { background: var(--panel-bg); border: 1px solid var(--border-glow); border-radius: 8px; overflow: hidden; backdrop-filter: blur(10px); }
        .addon-card img { width: 100%; height: 110px; object-fit: cover; }
        .addon-card-body { padding: 10px; border-top: 1px solid var(--border-glow); }
        .addon-card-body h4 { font-family: 'Orbitron', sans-serif; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-stats { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

        .hud-metrics { display: flex; gap: 10px; margin-bottom: 15px; }
        .hud-box { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glow); padding: 12px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .form-group label { font-family: 'Orbitron', sans-serif; font-size: 11px; text-transform: uppercase; color: var(--neon-secondary); }
        input[type="text"], input[type="email"], input[type="password"], textarea, select { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-glow); color: var(--text-main); border-radius: 8px; outline: none; font-size: 15px; -webkit-appearance: none; }
        
        .file-upload-wrapper { border: 2px dashed var(--border-glow); padding: 15px; text-align: center; border-radius: 8px; background: rgba(0,0,0,0.2); position: relative; cursor: pointer; transition: border-color 0.2s; }
        .file-upload-wrapper.has-file { border-color: var(--neon-success); background: rgba(0, 255, 163, 0.05); }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* NUEVO: Contenedor Cibernético de Barra de Progreso Real */
        .progress-hud { background: rgba(0,0,0,0.4); border: 1px solid var(--text-neon); padding: 15px; border-radius: 8px; margin-top: 15px; box-shadow: 0 0 15px rgba(0, 245, 255, 0.1); }
        .progress-labels { display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--text-neon); margin-bottom: 6px; }
        .progress-bar-track { background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid rgba(0, 245, 255, 0.2); }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary)); transition: width 0.1s linear; }

        .btn { padding: 14px; border-radius: 8px; border: none; font-family: 'Orbitron', sans-serif; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; width: 100%; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, var(--neon-primary), #4512e6); box-shadow: 0 0 15px rgba(124, 77, 255, 0.4); }
        .btn-primary:disabled { background: #1e1e2f; color: var(--text-muted); box-shadow: none; cursor: not-allowed; border: 1px solid var(--border-glow); }
        .btn-success { background: transparent; color: var(--neon-success); border: 1px solid var(--neon-success); }
        .btn-danger { background: transparent; color: var(--neon-danger); border: 1px solid var(--neon-danger); }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--border-glow); color: var(--text-muted); }

        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 70px; background: rgba(15, 23, 42, 0.95); border-top: 2px solid var(--border-glow); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(20px); z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: 'Orbitron', sans-serif; font-size: 10px; text-transform: uppercase; width: 45%; cursor: pointer; }
        .nav-item.active { color: var(--text-neon); text-shadow: 0 0 8px var(--text-neon); }
        .nav-item i { font-size: 22px; }

        .modal-terminal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3,7,18,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .terminal-box { background: #0b0f19; border: 2px solid var(--text-neon); width: 88%; padding: 20px; border-radius: 12px; }
        .terminal-header { font-family: 'Orbitron', sans-serif; color: var(--text-neon); font-size: 14px; border-bottom: 1px solid var(--border-glow); padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .hidden { display: none !important; }
        .ri-spin { animation: ri-spin 1s infinite linear; }
        @keyframes ri-spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo" onclick="switchView('view-home')"><i class="ri-pulse-line"></i> AddonHub</div>
            <button class="user-profile-btn" id="header-avatar-btn" onclick="openAuthTerminal()">
                <i class="ri-user-orbit-line"></i>
            </button>
        </header>

        <main id="app-content">
            
            <section id="view-home" class="view">
                <div class="search-area">
                    <div class="search-bar">
                        <i class="ri-search-line"></i>
                        <input type="text" id="search-input" placeholder="Buscar por nombre...">
                    </div>
                    <select id="sort-select" class="sort-select">
                        <option value="new">RECIENTES</option>
                        <option value="popular">POPULARES</option>
                    </select>
                </div>
                
                <div class="categories" id="category-filter-container">
                    <span class="badge active" data-category="all">Todos</span>
                    <span class="badge" data-category="Mundos">Mundos</span>
                    <span class="badge" data-category="Texturas">Texturas</span>
                    <span class="badge" data-category="Addons">Addons</span>
                </div>

                <h2><i class="ri-radar-line"></i> ADDONS DISPONIBLES</h2>
                <div class="addon-grid" id="addon-container"></div>
            </section>

            <section id="view-detail" class="view hidden" style="padding: 15px 20px;">
                <button class="btn btn-secondary" style="padding:8px 12px; width:auto; margin-bottom:15px;" onclick="switchView('view-home')"><i class="ri-arrow-left-line"></i> Volver</button>
                
                <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;">
                    <img id="detail-img" src="" style="width:85px; height:85px; object-fit:cover; border:2px solid var(--neon-secondary); border-radius:8px;">
                    <div>
                        <h2 id="detail-title" style="padding:0; color:white; font-size:20px; margin:0;">Título</h2>
                        <span style="color:var(--text-muted); font-size:13px;">MC: <strong id="detail-mcversion">1.20</strong></span><br>
                        <span style="color:var(--text-muted); font-size:13px;">Sector: <strong id="detail-category">Addons</strong></span>
                    </div>
                </div>

                <div class="hud-metrics">
                    <div class="hud-box" id="btn-like-trigger" style="cursor:pointer;">
                        <i class="ri-heart-fill" style="color:var(--neon-danger)"></i> <span id="detail-likes">0</span>
                    </div>
                    <div class="hud-box">
                        <i class="ri-download-2-line" style="color:var(--neon-secondary)"></i> <span id="detail-downloads">0</span>
                    </div>
                </div>

                <p id="detail-desc" style="background:rgba(0,0,0,0.3); padding:12px; border-radius:8px; border:1px solid var(--border-glow); line-height:1.5; font-size:15px; margin-bottom:12px; white-space:pre-wrap;"></p>
                <div id="detail-author" style="font-size:12px; color:var(--text-muted); margin-bottom:15px;"></div>

                <button id="btn-download-action" class="btn btn-success"><i class="ri-download-cloud-line"></i> Descargar Archivo</button>
                
                <div id="author-controls" class="hidden" style="margin-top:15px; display:flex; gap:10px;">
                    <button class="btn btn-secondary" id="btn-edit-trigger"><i class="ri-edit-line"></i> Editar</button>
                    <button class="btn btn-danger" id="btn-delete-trigger"><i class="ri-delete-bin-line"></i> Borrar</button>
                </div>
            </section>

            <section id="view-upload" class="view hidden" style="padding: 15px 20px;">
                <h2 id="upload-view-title"><i class="ri-cloud-upload-line"></i> Publicar Addon</h2>
                <br>
                <form id="upload-form">
                    <input type="hidden" id="form-addon-id">
                    <div class="form-group">
                        <label>Nombre del Addon</label>
                        <input type="text" id="up-title" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="up-category" required>
                            <option value="Mundos">Mundos</option>
                            <option value="Texturas">Texturas</option>
                            <option value="Addons">Addons</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Versión de Minecraft</label>
                        <input type="text" id="up-mcversion" placeholder="Ej: 1.21.0" required>
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="up-desc" rows="4" required></textarea>
                    </div>
                    
                    <div id="file-inputs-container">
                        <div class="form-group">
                            <label>Imagen (Miniatura - Max 5MB)</label>
                            <div class="file-upload-wrapper" id="wrapper-img">
                                <i class="ri-image-add-line" style="font-size:20px; color:var(--neon-secondary)"></i>
                                <p style="font-size:12px; margin-top:4px;" id="label-img">Seleccionar foto de galería</p>
                                <input type="file" id="up-img" accept="image/*" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Archivo (.mcpack, .mcaddon, .zip - Max 40MB)</label>
                            <div class="file-upload-wrapper" id="wrapper-file">
                                <i class="ri-folder-zip-line" style="font-size:20px; color:var(--neon-success)"></i>
                                <p style="font-size:12px; margin-top:4px;" id="label-file">Buscar archivo en el móvil</p>
                                <input type="file" id="up-file" accept=".mcpack,.mcaddon,.zip" required>
                            </div>
                        </div>
                    </div>

                    <div id="upload-progress-container" class="progress-hud hidden">
                        <div class="progress-labels">
                            <span id="progress-status-text">SUBIENDO ARCHIVOS...</span>
                            <span id="progress-percentage">0%</span>
                        </div>
                        <div class="progress-bar-track">
                            <div id="progress-bar-fill" class="progress-bar-fill"></div>
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-form-submit" class="btn btn-primary" style="margin-top:15px;">Subir a la app</button>
                </form>
            </section>

        </main>

        <div id="auth-terminal" class="modal-terminal hidden">
            <div class="terminal-box">
                <div class="terminal-header">
                    <span id="term-title">ACCESO</span>
                    <i class="ri-close-line" style="cursor:pointer; font-size:20px;" onclick="closeAuthTerminal()"></i>
                </div>
                
                <div id="auth-form-gate">
                    <form id="auth-core-form">
                        <div class="form-group hidden" id="fg-username">
                            <label>Nombre de Usuario</label>
                            <input type="text" id="auth-username">
                        </div>
                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <input type="email" id="auth-email" required>
                        </div>
                        <div class="form-group">
                            <label>Contraseña</label>
                            <input type="password" id="auth-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary" id="btn-auth-submit">Iniciar Sesión</button>
                    </form>
                    <p style="font-size:13px; text-align:center; margin-top:15px; color:var(--text-muted)">
                        <span id="auth-switch-text">¿No tienes cuenta?</span> 
                        <a href="#" id="auth-switch-link" style="color:var(--text-neon); text-decoration:none; font-weight:bold;">Regístrate</a>
                    </p>
                </div>

                <div id="auth-profile-gate" class="hidden">
                    <div style="text-align:center; margin-bottom:20px;">
                        <img id="profile-panel-img" src="" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--neon-success); margin-bottom:10px;">
                        <h3 id="profile-panel-name" style="padding:0; color:white;">Usuario</h3>
                        <p id="profile-panel-email" style="font-size:14px; color:var(--text-muted);"></p>
                    </div>
                    <button class="btn btn-danger" onclick="triggerSignOut()">Cerrar Sesión</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <button id="nav-home" onclick="switchView('view-home')" class="nav-item active"><i class="ri-compass-3-line"></i><span>Explorar</span></button>
            <button id="nav-upload" onclick="switchView('view-upload')" class="nav-item"><i class="ri-add-box-line"></i><span>Publicar</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // CONSERVACIÓN ABSOLUTA DE TUS CREDENCIALES EXISTENTES
        const firebaseConfig = {
            apiKey: "AIzaSyA3M_4MT4gKRDc4Ic3xuLqdNOMAL-7VNWc",
            authDomain: "adon-hub.firebaseapp.com",
            projectId: "adon-hub",
            storageBucket: "adon-hub.firebasestorage.app",
            messagingSenderId: "704577379579",
            appId: "1:704577379579:web:879f53f392c75df986a45e",
            measurementId: "G-3P8XZ2PN62"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let globalAddons = [];
        let activeAddonId = null;
        let selectedCategory = "all";
        let isSignUpMode = false;
        let isEditing = false;

        // MANEJO DE VISTAS COMPATIBLE CON GITHUB PAGES
        window.switchView = function(viewId) {
            if(viewId === 'view-upload' && !currentUser) {
                alert("🔒 Debes iniciar sesión para publicar en AddonHub.");
                openAuthTerminal();
                return;
            }
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(viewId === 'view-home') document.getElementById('nav-home').classList.add('active');
            if(viewId === 'view-upload') {
                document.getElementById('nav-upload').classList.add('active');
                resetUploadForm();
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const avatarBtn = document.getElementById('header-avatar-btn');
            if(user) {
                avatarBtn.innerHTML = `<img src="${user.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed='+user.uid}" alt="Profile">`;
                if (!document.getElementById('auth-terminal').classList.contains('hidden') && !isSignUpMode) {
                    closeAuthTerminal();
                }
            } else {
                avatarBtn.innerHTML = `<i class="ri-user-orbit-line"></i>`;
                if(!document.getElementById('view-upload').classList.contains('hidden')) {
                    switchView('view-home');
                }
            }
        });

        window.openAuthTerminal = function() {
            document.getElementById('auth-terminal').classList.remove('hidden');
            if(currentUser) {
                document.getElementById('term-title').innerText = "MI PERFIL";
                document.getElementById('auth-form-gate').classList.add('hidden');
                document.getElementById('auth-profile-gate').classList.remove('hidden');
                document.getElementById('profile-panel-img').src = currentUser.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + currentUser.uid;
                document.getElementById('profile-panel-name').innerText = currentUser.displayName || "Usuario Activo";
                document.getElementById('profile-panel-email').innerText = currentUser.email;
            } else {
                document.getElementById('term-title').innerText = "INICIAR SESIÓN";
                document.getElementById('auth-form-gate').classList.remove('hidden');
                document.getElementById('auth-profile-gate').classList.add('hidden');
                setAuthMode(false);
            }
        };

        window.closeAuthTerminal = function() { document.getElementById('auth-terminal').classList.add('hidden'); };

        const authLink = document.getElementById('auth-switch-link');
        authLink.addEventListener('click', (e) => { e.preventDefault(); setAuthMode(!isSignUpMode); });

        function setAuthMode(signUp) {
            isSignUpMode = signUp;
            if(signUp) {
                document.getElementById('fg-username').classList.remove('hidden');
                document.getElementById('btn-auth-submit').innerText = "Crear Cuenta";
                document.getElementById('auth-switch-text').innerText = "¿Ya tienes cuenta?";
                authLink.innerText = "Inicia Sesión";
            } else {
                document.getElementById('fg-username').classList.add('hidden');
                document.getElementById('btn-auth-submit').innerText = "Iniciar Sesión";
                document.getElementById('auth-switch-text').innerText = "¿No tienes cuenta?";
                authLink.innerText = "Regístrate";
            }
        }

        document.getElementById('auth-core-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const submitBtn = document.getElementById('btn-auth-submit');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Procesando...";

            try {
                if(isSignUpMode) {
                    const username = document.getElementById('auth-username').value.trim();
                    if(!username) { alert("Escribe tu nombre de usuario."); submitBtn.disabled = false; return; }

                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const defaultAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${userCredential.user.uid}`;
                    
                    await updateProfile(userCredential.user, { displayName: username, photoURL: defaultAvatar });
                    
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        uid: userCredential.user.uid,
                        username: username,
                        email: email,
                        photoURL: defaultAvatar,
                        createdAt: new Date().toISOString()
                    });
                    
                    alert("¡Cuenta creada correctamente!");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
                
                closeAuthTerminal();
                document.getElementById('auth-core-form').reset();
                switchView('view-home');
            } catch(err) {
                console.error(err);
                alert("Error de autenticación: Verifique sus datos.");
            } finally { 
                submitBtn.disabled = false; 
                submitBtn.innerText = isSignUpMode ? "Crear Cuenta" : "Iniciar Sesión";
            }
        });

        window.triggerSignOut = async function() {
            await signOut(auth);
            closeAuthTerminal();
            switchView('view-home');
        };

        // ESCUCHA SÍNCRO DE FIRESTORE (OPTIMIZADA)
        onSnapshot(collection(db, "addons"), (snapshot) => {
            globalAddons = [];
            snapshot.forEach(docSnap => {
                globalAddons.push({ id: docSnap.id, ...docSnap.data() });
            });
            renderGrid();
            if(activeAddonId) {
                const refreshed = globalAddons.find(a => a.id === activeAddonId);
                if(refreshed) updateDetailFields(refreshed);
            }
        });

        document.querySelectorAll('#category-filter-container .badge').forEach(badge => {
            badge.addEventListener('click', () => {
                document.querySelectorAll('#category-filter-container .badge').forEach(b => b.classList.remove('active'));
                badge.classList.add('active');
                selectedCategory = badge.getAttribute('data-category');
                renderGrid();
            });
        });
        document.getElementById('search-input').addEventListener('input', renderGrid);
        document.getElementById('sort-select').addEventListener('change', renderGrid);

        function renderGrid() {
            const container = document.getElementById('addon-container');
            if(!container) return;
            const search = document.getElementById('search-input').value.toLowerCase();
            const order = document.getElementById('sort-select').value;

            let result = globalAddons.filter(a => {
                const matchName = a.title ? a.title.toLowerCase().includes(search) : false;
                const matchCat = (selectedCategory === "all" || a.category === selectedCategory);
                return matchName && matchCat;
            });

            if(order === "popular") {
                result.sort((a,b) => (b.likes || 0) - (a.likes || 0));
            } else {
                result.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            }

            container.innerHTML = '';
            if(result.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; opacity:0.5; padding:20px;">No hay addons en esta sección</p>';
                return;
            }

            result.forEach(a => {
                const card = document.createElement('div');
                card.className = 'addon-card';
                card.onclick = () => openDetail(a);
                card.innerHTML = `
                    <img src="${a.imageUrl || 'https://via.placeholder.com/150'}" alt="preview">
                    <div class="addon-card-body">
                        <h4>${a.title}</h4>
                        <span style="font-size:11px; color:var(--text-neon)">${a.category}</span>
                        <div class="card-stats">
                            <span><i class="ri-heart-fill"></i> ${a.likes || 0}</span>
                            <span><i class="ri-download-2-line"></i> ${a.downloads || 0}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openDetail(addon) {
            activeAddonId = addon.id;
            updateDetailFields(addon);
            switchView('view-detail');
        }

        function updateDetailFields(addon) {
            document.getElementById('detail-img').src = addon.imageUrl;
            document.getElementById('detail-title').innerText = addon.title;
            document.getElementById('detail-mcversion').innerText = addon.minecraftVersion;
            document.getElementById('detail-category').innerText = addon.category;
            document.getElementById('detail-desc').innerText = addon.description;
            document.getElementById('detail-likes').innerText = addon.likes || 0;
            document.getElementById('detail-downloads').innerText = addon.downloads || 0;
            document.getElementById('detail-author').innerText = `Subido por: ${addon.authorName || 'Anónimo'}`;

            const controls = document.getElementById('author-controls');
            if(currentUser && addon.authorId === currentUser.uid) {
                controls.classList.remove('hidden');
            } else {
                controls.classList.add('hidden');
            }
        }

        document.getElementById('btn-like-trigger').addEventListener('click', async () => {
            if(!currentUser) { alert("🔒 Debes iniciar sesión para dar tu me gusta."); return; }
            try {
                await updateDoc(doc(db, "addons", activeAddonId), { likes: increment(1) });
            } catch(e) { console.error(e); }
        });

        document.getElementById('btn-download-action').addEventListener('click', async () => {
            const target = globalAddons.find(a => a.id === activeAddonId);
            if(!target) return;
            try {
                await updateDoc(doc(db, "addons", activeAddonId), { downloads: increment(1) });
                window.open(target.fileUrl, '_blank');
            } catch(e) { console.error(e); }
        });


        // OPTIMIZACIÓN VISUAL PARA ARCHIVOS EN MÓVILES
        function setFileLabelListeners(inputId, wrapperId, labelId, defaultText) {
            const input = document.getElementById(inputId);
            if(input) {
                input.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    const wrapper = document.getElementById(wrapperId);
                    const label = document.getElementById(labelId);
                    if(file) {
                        label.innerText = file.name.length > 25 ? file.name.substring(0,22) + "..." : file.name;
                        wrapper.classList.add('has-file');
                    } else {
                        label.innerText = defaultText;
                        wrapper.classList.remove('has-file');
                    }
                });
            }
        }
        setFileLabelListeners('up-img', 'wrapper-img', 'label-img', 'Seleccionar foto de galería');
        setFileLabelListeners('up-file', 'wrapper-file', 'label-file', 'Buscar archivo en el móvil');


        // PROMESA REUTILIZABLE PARA ENVIAR CON BARRA DE PROGRESO REAL
        function uploadWithProgress(file, path) {
            return new Promise((resolve, reject) => {
                const storageRef = ref(storage, path);
                const uploadTask = uploadBytesResumable(storageRef, file);

                const progressContainer = document.getElementById('upload-progress-container');
                const barFill = document.getElementById('progress-bar-fill');
                const percentageLabel = document.getElementById('progress-percentage');

                progressContainer.classList.remove('hidden');

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        barFill.style.width = progress + '%';
                        percentageLabel.innerText = Math.round(progress) + '%';
                    }, 
                    (error) => { reject(error); }, 
                    async () => {
                        const downloadUrl = await getDownloadURL(uploadTask.snapshot.ref);
                        resolve(downloadUrl);
                    }
                );
            });
        }


        // NUEVO SISTEMA SEGURO Y PROTEGIDO DE PUBLICACIÓN
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentUser) return;

            const submitBtn = document.getElementById('btn-form-submit');
            const title = document.getElementById('up-title').value.trim();
            const category = document.getElementById('up-category').value;
            const mcVersion = document.getElementById('up-mcversion').value.trim();
            const description = document.getElementById('up-desc').value.trim();
            const addonId = document.getElementById('form-addon-id').value;

            // 1. VALIDACIÓN EN VACÍO DE CAMPOS TEXTO
            if(!title || !mcVersion || !description) {
                alert("❌ Todos los campos de texto son obligatorios.");
                return;
            }

            // 2. DETECTAR SI ES EDICIÓN O NUEVA SUBIDA
            const imgFile = document.getElementById('up-img').files[0];
            const docFile = document.getElementById('up-file').files[0];

            if(!isEditing && (!imgFile || !docFile)) {
                alert("❌ Debes adjuntar la miniatura y el archivo correspondiente.");
                return;
            }

            // 3. CONTROL DE DUPLICADOS LOCALES ANTES DE SUBIR A LA RED
            if(!isEditing) {
                const isDuplicate = globalAddons.some(addon => addon.title.toLowerCase() === title.toLowerCase());
                if(isDuplicate) {
                    alert("⚠️ Ya existe un Addon registrado con este nombre exacto. Cambia el título para evitar colisiones.");
                    return;
                }
            }

            // 4. VALIDACIONES DE ARCHIVO (FORMATOS Y PESO)
            if(imgFile) {
                if(imgFile.size > 5 * 1024 * 1024) { // Max 5MB
                    alert("❌ La imagen sobrepasa el límite máximo permitido (5MB).");
                    return;
                }
            }

            if(docFile) {
                const extension = docFile.name.split('.').pop().toLowerCase();
                const allowedExtensions = ['mcpack', 'mcaddon', 'zip'];
                if(!allowedExtensions.includes(extension)) {
                    alert("❌ Formato inválido. Solo se admiten archivos .mcpack, .mcaddon o .zip");
                    return;
                }
                if(docFile.size > 40 * 1024 * 1024) { // Max 40MB
                    alert("❌ El paquete de datos excede los 40MB reglamentarios.");
                    return;
                }
            }

            // DESHABILITAR CONTROLES PARA EVITAR DUPLICACIÓN POR DOBLE TAP
            submitBtn.disabled = true;
            submitBtn.innerHTML = "<i class='ri-loader-4-line ri-spin'></i> TRANSMITIENDO DATOS...";

            try {
                let imageUrl = isEditing ? null : "";
                let fileUrl = isEditing ? null : "";

                // Cambiar el label de estado
                document.getElementById('progress-status-text').innerText = "PROCESANDO MINIATURA...";
                if(imgFile) {
                    imageUrl = await uploadWithProgress(imgFile, `previews/${Date.now()}_${imgFile.name}`);
                }

                document.getElementById('progress-status-text').innerText = "SUBIENDO ARCHIVO MCPACK/ZIP...";
                if(docFile) {
                    fileUrl = await uploadWithProgress(docFile, `addons/${Date.now()}_${docFile.name}`);
                }

                if(isEditing) {
                    const updateData = { title, category, minecraftVersion: mcVersion, description };
                    if(imageUrl) updateData.imageUrl = imageUrl;
                    if(fileUrl) updateData.fileUrl = fileUrl;

                    await updateDoc(doc(db, "addons", addonId), updateData);
                    alert("🛰️ ¡Matriz de datos actualizada con éxito!");
                } else {
                    // ESCRITURA CON ADDdoc EVITANDO FALLOS DE IDENTIFICADORES VÁLIDOS
                    await addDoc(collection(db, "addons"), {
                        title, category, minecraftVersion: mcVersion, description, imageUrl, fileUrl,
                        authorId: currentUser.uid,
                        authorName: currentUser.displayName || "Usuario Móvil",
                        downloads: 0, likes: 0,
                        createdAt: new Date().toISOString()
                    });
                    alert("🚀 ¡Addon inyectado correctamente en el servidor global!");
                }
                switchView('view-home');
            } catch(err) {
                console.error("Fallo de subida: ", err);
                alert("❌ Error crítico en los servidores de almacenamiento. Revisa tu conexión de datos.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Subir a la app";
                document.getElementById('upload-progress-container').classList.add('hidden');
            }
        });

        document.getElementById('btn-delete-trigger').addEventListener('click', async () => {
            if(!activeAddonId || !confirm("¿Seguro que deseas borrar este addon?")) return;
            try {
                await deleteDoc(doc(db, "addons", activeAddonId));
                activeAddonId = null;
                alert("Addon eliminado.");
                switchView('view-home');
            } catch(e) { alert("Error al eliminar."); }
        });

        document.getElementById('btn-edit-trigger').addEventListener('click', () => {
            const target = globalAddons.find(a => a.id === activeAddonId);
            if(!target) return;

            isEditing = true;
            document.getElementById('upload-view-title').innerHTML = "<i class='ri-edit-box-line'></i> Editar Addon";
            document.getElementById('form-addon-id').value = target.id;
            document.getElementById('up-title').value = target.title;
            document.getElementById('up-category').value = target.category;
            document.getElementById('up-mcversion').value = target.minecraftVersion;
            document.getElementById('up-desc').value = target.description;
            
            document.getElementById('btn-form-submit').innerText = "Guardar Cambios";
            document.getElementById('up-img').required = false;
            document.getElementById('up-file').required = false;

            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-upload').classList.remove('hidden');
        });

        function resetUploadForm() {
            isEditing = false;
            document.getElementById('upload-form').reset();
            document.getElementById('upload-view-title').innerHTML = "<i class='ri-cloud-upload-line'></i> Publicar Addon";
            document.getElementById('form-addon-id').value = "";
            document.getElementById('btn-form-submit').innerText = "Subir a la app";
            document.getElementById('up-img').required = true;
            document.getElementById('up-file').required = true;
            
            document.getElementById('wrapper-img').classList.remove('has-file');
            document.getElementById('label-img').innerText = 'Seleccionar foto de galería';
            document.getElementById('wrapper-file').classList.remove('has-file');
            document.getElementById('label-file').innerText = 'Buscar archivo en el móvil';
            document.getElementById('upload-progress-container').classList.add('hidden');
        }
    </script>
</body>
</html>
